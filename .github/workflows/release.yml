name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test --coverage

      - name: Set version
        run: |
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Update package version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Update CHANGELOG version
        run: |
          CURRENT_CHANGELOG_VERSION=$(awk '/^## / { print $2; exit }' CHANGELOG.md)
          if [ "$CURRENT_CHANGELOG_VERSION" != "$VERSION" ]; then
            sed -i "s/^## [0-9]\+\.[0-9]\+\.[0-9]\+/## $VERSION/" CHANGELOG.md
          fi

      - name: Generate Release Notes
        id: release_notes
        run: |
          {
            echo "notes<<EOF"
            awk -v version="$VERSION" '
              $0 ~ "^## " version "([ -]|$)" { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        run: bun run build

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No version files changed"
          else
            git commit -m "chore: bump version to $VERSION [skip ci]"
          fi
          git tag v$VERSION
          git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false

      - name: Publish to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          bun publish --access public
